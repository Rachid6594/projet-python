<header class="bg-white border-bottom px-4 py-2 d-flex align-items-center justify-content-between shadow-sm">
    <h6 class="mb-0 text-muted fw-normal">{% block page_title %}{% endblock %}</h6>
    <div class="d-flex align-items-center gap-2">
        <i class="bi bi-person-circle fs-5 text-primary"></i>
        <span class="fw-semibold">{{ current_user.nom_complet }}</span>
        <span class="badge bg-primary-subtle text-primary ms-1">{{ current_user.role | capitalize }}</span>
    </div>
</header>
