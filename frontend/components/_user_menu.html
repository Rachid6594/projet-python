{# ── Topbar ── #}
<header class="topbar">
  <div class="topbar-left">
    <button class="sidebar-toggle" onclick="toggleSidebar()">
      <i class="bi bi-list"></i>
    </button>
    <h1 class="topbar-title">{% block page_title %}{% endblock %}</h1>
  </div>
  <div class="topbar-right">
    <div class="topbar-user">
      <div class="topbar-avatar">
        {{ current_user.prenom[0] }}{{ current_user.nom[0] }}
      </div>
      <div>
        <div class="topbar-user-name">{{ current_user.prenom }} {{ current_user.nom }}</div>
        <div class="topbar-user-role">{{ current_user.role }}</div>
      </div>
    </div>
  </div>
</header>
